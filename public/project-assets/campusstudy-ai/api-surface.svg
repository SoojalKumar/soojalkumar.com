    <text x="143" y="401" font-size="18" fill="#475569">register / login / me</text>

    <rect x="386" y="330" width="230" height="96" rx="22" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
    <text x="411" y="368" font-size="23" font-weight="800" fill="#111827">Courses</text>
    <text x="411" y="401" font-size="18" fill="#475569">universities / topics</text>

    <rect x="654" y="330" width="230" height="96" rx="22" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
    <text x="679" y="368" font-size="23" font-weight="800" fill="#111827">Materials</text>
    <text x="679" y="401" font-size="18" fill="#475569">upload / status / chunks</text>

    <rect x="922" y="330" width="230" height="96" rx="22" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="2"/>
