  <text x="700" y="127" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF">CampusStudy AI API Surface</text>

  <text x="118" y="232" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900" fill="#111827">FastAPI Domain Map</text>
  <text x="118" y="272" font-family="Inter, Arial, sans-serif" font-size="22" fill="#64748B">Routes are organized around academic identity, course materials, generated study assets, chat, processing jobs, and admin visibility.</text>

  <g font-family="Inter, Arial, sans-serif">
