<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="CampusStudy AI FastAPI API surface map">
  <rect width="1400" height="900" fill="#F8FAFC"/>
  <rect x="70" y="70" width="1260" height="760" rx="34" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="3"/>
  <rect x="70" y="70" width="1260" height="92" rx="34" fill="#0B1120"/>
  <circle cx="120" cy="116" r="12" fill="#F87171"/>
