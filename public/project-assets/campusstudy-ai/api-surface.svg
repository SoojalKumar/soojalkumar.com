    <text x="143" y="546" font-size="18" fill="#475569">generate / by course</text>

    <rect x="386" y="475" width="230" height="96" rx="22" fill="#ECFEFF" stroke="#A5F3FC" stroke-width="2"/>
    <text x="411" y="513" font-size="23" font-weight="800" fill="#111827">Flashcards</text>
    <text x="411" y="546" font-size="18" fill="#475569">decks / review</text>

    <rect x="654" y="475" width="230" height="96" rx="22" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
