    <text x="947" y="513" font-size="23" font-weight="800" fill="#111827">Chat</text>
    <text x="947" y="546" font-size="18" fill="#475569">threads / messages</text>

    <rect x="252" y="620" width="230" height="96" rx="22" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
