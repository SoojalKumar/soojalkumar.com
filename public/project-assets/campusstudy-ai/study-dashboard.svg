  <text x="146" y="408" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Ask citation-grounded questions</text><text x="146" y="442" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Use uploaded course context</text>
  
  <rect x="520" y="320" width="360" height="190" rx="24" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
