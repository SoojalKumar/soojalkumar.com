  <text x="548" y="408" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Notes and summaries</text><text x="548" y="442" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Flashcards and quizzes</text>
  
  <rect x="922" y="320" width="290" height="190" rx="24" fill="#FFFFFF" stroke="#D7E1EA" stroke-width="2"/>
