  <text x="950" y="408" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Notes</text><text x="950" y="442" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Materials</text><text x="950" y="476" font-family="Inter, Arial, sans-serif" font-size="21" fill="#475569">Citations</text>
  
  <rect x="118" y="555" width="1094" height="150" rx="24" fill="#F8FAFC" stroke="#D7E1EA" stroke-width="2"/>
